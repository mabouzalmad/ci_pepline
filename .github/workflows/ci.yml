on:
  push:
    branches:
      -main
    branches:
      -main
jobs:
  build:
    runs-on: ubuntu-lastet
    steps:
      -name: recuperer code
      -uses: actions/checkout
      -name: installer python
      -uses: actions/setup-python
      with:
        python-version:"3.11"
      -name: installer les dependencies
      run: pip install -r requirements.txt
  lint:
      -name: linter
      -uses: flake8 app --count --select=E9,F63,F7,F82,F82,F841 --show-source --statistics
             flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
             flake8 tests --count --max-line-length=127 --statistics
      -name: lancer tests
      run: pytest -v --cov=app