name: TP5

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: installer python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: installer les dependances
        run: pip install -r requirements.txt
      - name: lancer flake8
        run: |
          flake8 app/user_manager.py --count --select=E9,F63,F7,F82,F841 --show-source --statistics
          flake8 app --count --max-complexity=10 --max-line-length=127 --statistics
          flake8 tests --count --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: installer python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: installer les dependances
        run: pip install -r requirements.txt
      - name: lancer les tests
        run: python -m pytest tests/ -v --cov=app

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: installer python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: installer outils de build
        run: python -m pip install --upgrade pip build
      - name: generer le package python
        run: python -m build
      - name: upload de resultat comme artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/


